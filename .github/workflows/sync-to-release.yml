name: Sync to release repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release files
        run: |
          mkdir -p /tmp/release-staging

          cp -a . /tmp/release-staging/
          cd /tmp/release-staging
          rm -rf .git .github

          rm -rf tests/ evals/ mine-workspace/ __pycache__/
          rm -f example-worker.py pyproject.toml requirements-dev.txt .skillignore

          rm -f docs/frontend-skill-development-guide-en.md
          rm -f docs/SCHEMA_LAYERING_4PLATFORMS.md
          rm -f docs/Subnet_protocol_v2.0.md
          rm -f docs/FIELD_ALIGNMENT_GUIDE.md
          rm -f docs/OPENCLAW_HOST_INTEGRATION.md

          find . -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true
          find . -name '*.pyc' -delete 2>/dev/null || true

          echo "Release files: $(find . -type f | wc -l)"

      - name: Get source commit info
        id: source
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "sha_full=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Checkout fork (data4agent/mine-skill)
        uses: actions/checkout@v4
        with:
          repository: data4agent/mine-skill
          token: ${{ secrets.FORK_PAT }}
          path: fork-repo
          fetch-depth: 0

      - name: Sync files to fork branch
        id: sync
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        run: |
          cd fork-repo

          BRANCH="sync/${SOURCE_SHA}"
          git checkout -b "$BRANCH"

          # Remove all tracked files except .git
          git ls-files -z | xargs -0 rm -f 2>/dev/null || true

          # Copy release files in
          cp -a /tmp/release-staging/. ./

          # Check for changes
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes to sync"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
            git status --short | head -30
          fi

      - name: Push fork branch and create PR to upstream
        if: steps.sync.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.FORK_PAT }}
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
          SOURCE_SHA_FULL: ${{ steps.source.outputs.sha_full }}
          BRANCH: ${{ steps.sync.outputs.branch }}
        run: |
          cd fork-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "sync: update from data4agent/mine@${SOURCE_SHA}"
          git push origin "$BRANCH"

          gh pr create \
            --repo awp-worknet/mine-skill \
            --base main \
            --head "data4agent:${BRANCH}" \
            --title "sync: update @${SOURCE_SHA}" \
            --body "Automated sync from [data4agent/mine@\`${SOURCE_SHA}\`](https://github.com/data4agent/mine/commit/${SOURCE_SHA_FULL}).

          Excludes dev-only files: tests/, evals/, mine-workspace/, example-worker.py, pyproject.toml, dev docs."
